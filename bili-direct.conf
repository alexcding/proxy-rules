# Bilibili playurl hosts forced DIRECT — fetch the playurl from your real overseas IP so
# Bilibili returns the CDN-only (no-P2P) response, like the web player. Fast video start.
#
# USAGE: reference this ABOVE cn-proxy.conf in Default.conf [Rule], e.g.:
#   RULE-SET,https://raw.githubusercontent.com/alexcding/proxy-rules/main/bili-direct.conf,DIRECT
#   RULE-SET,https://raw.githubusercontent.com/alexcding/proxy-rules/main/cn-proxy.conf,China
#   ...
# It MUST come before cn-proxy (Surge matches top-to-bottom; cn-proxy's DOMAIN-SUFFIX
# biliapi.net/bilibili.com would otherwise send these to China first).
#
# Everything else Bilibili (api.bilibili.com, PGC/membership, etc.) stays on cn-proxy -> China,
# so region/membership access is unchanged. Media (bilivideo.com) is already DIRECT via cn-direct.conf.
#
# If a region-locked 番剧/PGC stops playing after enabling this, the app fetches PGC playurl via
# grpc too — move grpc.biliapi.net back to China (or use biliRoaming for region unlock).
DOMAIN,grpc.biliapi.net
DOMAIN,app.bilibili.com
