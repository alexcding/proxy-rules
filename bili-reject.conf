# Bilibili telemetry / logging endpoints — pure analytics, no content value.
# Rejecting them removes wasted round-trips (esp. costly when the app routes via a
# China proxy), which makes the UI feel snappier. Safe: these only carry logs.
#
# USAGE: reference ABOVE cn-proxy.conf in Default.conf [Rule], e.g.:
#   RULE-SET,https://raw.githubusercontent.com/alexcding/proxy-rules/main/bili-direct.conf,DIRECT
#   RULE-SET,https://raw.githubusercontent.com/alexcding/proxy-rules/main/bili-reject.conf,REJECT
#   RULE-SET,https://raw.githubusercontent.com/alexcding/proxy-rules/main/cn-proxy.conf,China
#   ...
# Must precede cn-proxy (its DOMAIN-SUFFIX bilibili.com/biliapi.com would otherwise send these to China).
DOMAIN,data.bilibili.com
DOMAIN,dataflow.biliapi.com
